    <style type="text/css">
        img {
            border-radius: 25px
        }
    </style>


    <title>peakchao</title>

    <script>
        function addContent(data) {
            let result = data.result
            for (let i = 0; i < result.length; i++) {
                createRow(result[i])
            }
        }


        function createRow(result) {
            const editTable = document.getElementById("tbody");
            const tr = document.createElement("tr");
            const td0 = document.createElement("td");
            td0.innerHTML = "<img src=\"" + result.headerImg + "\" width='50px' height='50px'>";
            const td1 = document.createElement("td");
            td1.innerHTML = result.nickName;
            const td2 = document.createElement("td");
            td2.innerHTML = result.loginName;
            const td3 = document.createElement("td");
            td3.innerHTML = result.createdAt;
            tr.appendChild(td0);
            tr.appendChild(td1);
            tr.appendChild(td2);
            tr.appendChild(td3);
            editTable.appendChild(tr);
        }

        function requset() {
            $.ajax({
                type: "get",
                url: "http://47.240.49.105/v1/",
                async: true,
                success: function (data) {
                    addContent(data)
                    console.log("请求成功:", data)
                }, error: function (data) {
                    console.log("请求成功:", data)
                }
            });
        }

        requset()
    </script>


</head>
